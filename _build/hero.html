<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<style>
  :root{
    --ink:#070C15; --ink2:#0C1A2E; --surface:#111E36;
    --mint:#2DE0C5; --mint-dim:#1BA894;
    --text:#F3F7FC; --muted:#8DA0BC; --faint:#4A5A78;
    --up:#3DDC84; --down:#FF6B6B;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1360px;height:840px;overflow:hidden}
  body{
    font-family:'Apple SD Gothic Neo',sans-serif;
    background:
      radial-gradient(1100px 780px at 82% 12%, rgba(45,224,197,.13), transparent 60%),
      radial-gradient(900px 700px at 8% 108%, rgba(45,224,197,.06), transparent 55%),
      linear-gradient(150deg,#060B14 0%,#0A1424 52%,#0C1A2E 100%);
    color:var(--text); position:relative;
  }
  /* 미세 그리드 텍스처 */
  .grid{position:absolute;inset:0;opacity:.35;
    background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),
      linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);
    background-size:52px 52px; -webkit-mask-image:linear-gradient(180deg,transparent,#000 30%,#000 78%,transparent)}
  /* 하단 캔들 데이터 텍스처 */
  .candles{position:absolute;left:0;right:0;bottom:0;height:230px;opacity:.5;
    -webkit-mask-image:linear-gradient(180deg,transparent,#000 70%)}

  .wrap{position:absolute;inset:0;display:grid;grid-template-columns:47% 53%;align-items:center}

  /* ── 좌측 카피 ── */
  .copy{padding:0 0 0 92px;position:relative;z-index:5}
  .brand{display:flex;align-items:center;gap:16px;margin-bottom:64px}
  .mark{display:flex;align-items:flex-end;gap:5px;height:46px}
  .mark i{width:11px;border-radius:3px;display:block}
  .mark .c1{height:24px;background:#37506F}
  .mark .c2{height:34px;background:var(--mint)}
  .mark .c3{height:46px;background:var(--mint)}
  .brand .name{font-size:30px;font-weight:700;letter-spacing:-.5px}
  .brand .lat{font-family:'Menlo',monospace;font-size:12px;letter-spacing:4px;
    color:var(--faint);margin-top:5px}

  .eyebrow{font-family:'Menlo',monospace;font-size:14px;letter-spacing:5px;
    color:var(--mint);margin-bottom:26px;font-weight:600}
  .eyebrow .dot{color:var(--faint)}
  h1{font-size:118px;line-height:.98;font-weight:800;letter-spacing:-4px}
  h1 .why{color:var(--mint)}
  .sub{font-size:23px;line-height:1.62;color:var(--muted);font-weight:400;
    margin-top:38px;max-width:520px}
  .sub b{color:var(--text);font-weight:600}

  .chips{display:flex;gap:12px;margin-top:46px}
  .chip{font-size:16px;font-weight:600;color:var(--text);
    padding:11px 20px;border:1px solid rgba(141,160,188,.34);border-radius:999px;
    display:flex;align-items:center;gap:9px}
  .chip.pri{background:var(--mint);color:#04231D;border-color:transparent}
  .chip .k{width:7px;height:7px;border-radius:50%;background:var(--mint)}

  /* ── 우측 폰 라인업 ── */
  .stage{position:relative;height:840px}
  .glow{position:absolute;width:720px;height:720px;border-radius:50%;
    background:radial-gradient(circle,rgba(45,224,197,.22),transparent 62%);
    left:150px;top:70px;filter:blur(20px)}
  .phone{position:absolute;border-radius:44px;overflow:hidden;
    background:#0b1220;border:8px solid #16233c;
    box-shadow:0 50px 90px -30px rgba(0,0,0,.75), 0 0 0 1px rgba(45,224,197,.10);}
  .phone img{display:block;width:100%;height:100%;object-fit:cover}
  .p-center{width:340px;height:736px;left:262px;top:52px;z-index:3;
    box-shadow:0 60px 110px -28px rgba(0,0,0,.82), 0 0 0 1px rgba(45,224,197,.16)}
  .p-left{width:300px;height:650px;left:38px;top:120px;transform:rotate(-7deg);z-index:2;opacity:.96}
  .p-right{width:300px;height:650px;left:566px;top:120px;transform:rotate(7deg);z-index:2;opacity:.96}
  /* 부제 라벨 (모노 시세) */
  .tick{position:absolute;z-index:4;font-family:'Menlo',monospace;font-size:13px;
    letter-spacing:1px;color:var(--muted);background:rgba(12,22,38,.82);
    border:1px solid rgba(141,160,188,.22);border-radius:10px;padding:9px 13px;
    backdrop-filter:blur(4px)}
  .tick .up{color:var(--up)} .tick .dn{color:var(--down)} .tick .mt{color:var(--mint)}
</style></head>
<body>
  <div class="grid"></div>
  <svg class="candles" viewBox="0 0 1360 230" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg"></svg>

  <div class="wrap">
    <div class="copy">
      <div class="brand">
        <div class="mark"><i class="c1"></i><i class="c2"></i><i class="c3"></i></div>
        <div>
          <div class="name">시그널스톡</div>
          <div class="lat">SIGNALSTOCK</div>
        </div>
      </div>

      <div class="eyebrow">한국 주식 <span class="dot">·</span> 매일 저녁 신호</div>
      <h1>뭘 사고,<br>뭘 팔고,<br><span class="why">왜?</span></h1>
      <div class="sub">매일 저녁, 한국 주식 <b>3,700여 종목</b>을 대신 스크리닝해<br>오늘의 매수·청산 신호와 <b>그 근거·통계</b>를 알려드립니다.</div>

      <div class="chips">
        <div class="chip pri">무료</div>
        <div class="chip"><span class="k"></span>iOS 심사 중</div>
        <div class="chip">로그인 없이 체험</div>
      </div>
    </div>

    <div class="stage">
      <div class="glow"></div>
      <div class="phone p-left"><img src="../assets/screenshots/02-signal-why.png"></div>
      <div class="phone p-right"><img src="../assets/screenshots/04-chart-levels.png"></div>
      <div class="phone p-center"><img src="../assets/screenshots/01-home-feed.png"></div>
      <div class="tick" style="left:150px;top:44px">KOSPI <span class="dn">▼ 6.37%</span> <span style="color:var(--faint)">·</span> 오늘 신호 <span class="mt">123건</span></div>
    </div>
  </div>

  <script>
    // 하단 캔들 텍스처 생성 (결정적)
    const svg=document.querySelector('.candles'); let x=14; let seed=7;
    function rnd(){seed=(seed*1103515245+12345)&0x7fffffff;return (seed>>8)/0x7fffff}
    let ph=150;
    while(x<1360){
      const w=9, body=18+rnd()*70, wick=body+14+rnd()*30;
      const up=rnd()>.5; const col=up?'#25603f':'#5a2b2b';
      const cy=150+(rnd()-.5)*60; const top=cy-body/2;
      svg.innerHTML+=`<line x1="${x+w/2}" y1="${cy-wick/2}" x2="${x+w/2}" y2="${cy+wick/2}" stroke="${col}" stroke-width="2"/>`+
        `<rect x="${x}" y="${top}" width="${w}" height="${body}" rx="2" fill="${col}"/>`;
      x+=w+9;
    }
  </script>
</body></html>
