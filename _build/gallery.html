<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<style>
  :root{--mint:#2DE0C5;--text:#F3F7FC;--muted:#93A4C0;--faint:#5D6B84}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1360px;height:830px;overflow:hidden}
  body{font-family:'Apple SD Gothic Neo',sans-serif;
    background:
      radial-gradient(1000px 500px at 50% 120%, rgba(45,224,197,.07), transparent 60%),
      linear-gradient(180deg,#0A1322 0%,#070C15 100%);
    color:var(--text);padding:66px 70px 0}
  .head{text-align:center;margin-bottom:52px}
  .eyebrow{font-family:'Menlo',monospace;font-size:13px;letter-spacing:5px;
    color:var(--mint);font-weight:600;margin-bottom:16px}
  h2{font-size:44px;font-weight:800;letter-spacing:-1.5px}
  .row{display:flex;justify-content:center;gap:26px}
  .item{width:224px;text-align:center}
  .phone{width:224px;height:485px;border-radius:30px;overflow:hidden;
    background:#0b1220;border:6px solid #17243c;
    box-shadow:0 34px 60px -26px rgba(0,0,0,.7), 0 0 0 1px rgba(45,224,197,.08);position:relative}
  .phone img{position:absolute;top:0;left:0;width:100%;object-fit:cover;object-position:top}
  .cap{margin-top:20px;font-size:16px;font-weight:600;letter-spacing:-.3px}
  .cap .n{font-family:'Menlo',monospace;font-size:12px;color:var(--faint);
    display:block;margin-bottom:6px;letter-spacing:2px}
</style></head>
<body>
  <div class="head">
    <div class="eyebrow">화면 미리보기</div>
    <h2>직접 둘러보세요</h2>
  </div>
  <div class="row">
    <div class="item"><div class="phone"><img src="../assets/screenshots/01-home-feed.png"></div>
      <div class="cap"><span class="n">01</span>오늘의 신호</div></div>
    <div class="item"><div class="phone"><img src="../assets/screenshots/02-signal-why.png"></div>
      <div class="cap"><span class="n">02</span>신호의 이유</div></div>
    <div class="item"><div class="phone"><img src="../assets/screenshots/03-backtest.png"></div>
      <div class="cap"><span class="n">03</span>백테스트</div></div>
    <div class="item"><div class="phone"><img src="../assets/screenshots/04-chart-levels.png"></div>
      <div class="cap"><span class="n">04</span>차트·기준선</div></div>
    <div class="item"><div class="phone"><img src="../assets/screenshots/05-strategy-compare.png"></div>
      <div class="cap"><span class="n">05</span>전략 비교</div></div>
  </div>
</body></html>
